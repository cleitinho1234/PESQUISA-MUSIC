<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Planta Fácil</title>

<style>

body{
margin:0;
background:#222;
display:flex;
flex-direction:column;
align-items:center;
color:white;
font-family:Arial;
text-align:center;
}

h1{
margin:10px;
font-size:20px;
}

canvas{
border:2px solid black;
touch-action:none;
}

button{
margin:10px;
padding:10px 20px;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<h1>Alisson da Cruz Silva fez esse site para Renilson</h1>

<canvas id="canvas" width="800" height="600"></canvas>

<div>
<button onclick="undoLine()">Apagar última linha</button>
<button onclick="download()">Baixar Planta</button>
</div>

<script>

const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");

let drawing=false;
let startX,startY;

const grid=40;

let lines=[];
let selectedLine=null;

function drawGrid(){

ctx.fillStyle="white";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.strokeStyle="#ddd";

for(let x=0;x<canvas.width;x+=grid){
ctx.beginPath();
ctx.moveTo(x,0);
ctx.lineTo(x,canvas.height);
ctx.stroke();
}

for(let y=0;y<canvas.height;y+=grid){
ctx.beginPath();
ctx.moveTo(0,y);
ctx.lineTo(canvas.width,y);
ctx.stroke();
}

}

function redraw(){

drawGrid();

ctx.strokeStyle="black";
ctx.lineWidth=4;

lines.forEach(line=>{

ctx.beginPath();
ctx.moveTo(line.x1,line.y1);
ctx.lineTo(line.x2,line.y2);
ctx.stroke();

if(line.text){

let mx=(line.x1+line.x2)/2;
let my=(line.y1+line.y2)/2;

ctx.fillStyle="blue";
ctx.font="16px Arial";
ctx.fillText(line.text,mx+5,my-5);

}

});

}

drawGrid();

canvas.addEventListener("pointerdown",(e)=>{

const rect=canvas.getBoundingClientRect();

let x=e.clientX-rect.left;
let y=e.clientY-rect.top;

let clickedLine=findLine(x,y);

if(clickedLine){

let ask=confirm("Quer inserir números?");

if(ask){

let value=prompt("Digite o número:");

if(value){
clickedLine.text=value;
redraw();
}

}

return;

}

drawing=true;

startX=Math.round(x/grid)*grid;
startY=Math.round(y/grid)*grid;

});

canvas.addEventListener("pointerup",(e)=>{

if(!drawing) return;

drawing=false;

const rect=canvas.getBoundingClientRect();

let endX=Math.round((e.clientX-rect.left)/grid)*grid;
let endY=Math.round((e.clientY-rect.top)/grid)*grid;

lines.push({
x1:startX,
y1:startY,
x2:endX,
y2:endY,
text:""
});

redraw();

});

function findLine(x,y){

for(let line of lines){

let dist=distanceToLine(x,y,line);

if(dist<10){
return line;
}

}

return null;

}

function distanceToLine(px,py,line){

let x1=line.x1;
let y1=line.y1;
let x2=line.x2;
let y2=line.y2;

let A=px-x1;
let B=py-y1;
let C=x2-x1;
let D=y2-y1;

let dot=A*C+B*D;
let len=C*C+D*D;

let param=dot/len;

let xx,yy;

if(param<0){
xx=x1;
yy=y1;
}else if(param>1){
xx=x2;
yy=y2;
}else{
xx=x1+param*C;
yy=y1+param*D;
}

let dx=px-xx;
let dy=py-yy;

return Math.sqrt(dx*dx+dy*dy);

}

function undoLine(){

lines.pop();
redraw();

}

function download(){

const tempCanvas=document.createElement("canvas");
const tempCtx=tempCanvas.getContext("2d");

tempCanvas.width=canvas.width;
tempCanvas.height=canvas.height;

tempCtx.fillStyle="white";
tempCtx.fillRect(0,0,tempCanvas.width,tempCanvas.height);

tempCtx.drawImage(canvas,0,0);

const link=document.createElement("a");

link.download="planta.png";
link.href=tempCanvas.toDataURL("image/png");

link.click();

}

</script>

</body>
</html>
