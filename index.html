<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Luffy Music</title>

<style>

body{
margin:0;
font-family:Arial;
text-align:center;
color:white;
background-image:url("https://images.unsplash.com/photo-1501612780327-45045538702b");
background-size:cover;
background-position:center;
height:100vh;
}

.container{
background:rgba(0,0,0,0.6);
padding:40px;
margin-top:80px;
}

input{
padding:12px;
font-size:18px;
width:300px;
border-radius:8px;
border:none;
}

button{
padding:12px 20px;
font-size:18px;
border:none;
border-radius:8px;
cursor:pointer;
background:#ff2e2e;
color:white;
}

iframe{
margin-top:30px;
width:80%;
height:400px;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<div class="container">

<h1>🎵 Luffy Music Player</h1>

<p>Pesquise qualquer música</p>

<input id="pesquisa" placeholder="Digite o nome da música">

<button onclick="buscar()">Buscar</button>

<div id="player"></div>

</div>

<script>

function buscar(){

let musica = document.getElementById("pesquisa").value;

document.getElementById("player").innerHTML =
`<iframe src="https://www.youtube.com/embed?listType=search&list=${musica}" allowfullscreen></iframe>`;

}

</script>

</body>
</html>
